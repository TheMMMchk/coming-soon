<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СКОРО</title>
    <link rel="shortcut icon" href="favicon-32x32.png" type="image/png" sizes="32x32"/>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #dfdfdf;
        }
        main {
            text-align: center;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(56, 56, 56, 0.1);
        }
        h1 {
            font-size: 40px;
            margin-bottom: 0;
        }
        p {
            font-size: 18px;
            color: #555;
        }
        .time {
            font-size: 48px;
            margin: 4px 0 20px;
            font-family: Impact, sans-serif;
            color: #000000;
        }
        a {
            color: #ff0077;
            text-decoration: underline;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: linear-gradient(135deg,#8b5cf6 0%,#7c2cff 70%,#ff5fb8 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 999px;
            transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
            cursor: pointer;
            border: none;
            font-weight: 700;
            letter-spacing: 0.2px;
            box-shadow: 0 6px 18px rgba(124,44,255,0.18);
            position: relative;
            overflow: hidden;
        }

        .btn.disabled {
            opacity: 0.65;
            cursor: not-allowed;
            box-shadow: 0 4px 12px rgba(124,44,255,0.12);
        }

        .like-message {
            opacity: 0;
            transform: translateY(10px);
            margin-top: 18px;
            color: #4a3db5;
            font-weight: 600;
            transition: opacity .4s ease, transform .4s ease;
            font-size: 17px;
        }

        .like-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .like-message strong {
            color: #7c2cff;
        }

        .btn::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: 300%;
            height: 300%;
            transform: translate(-50%, -50%) scale(0);
            background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 40%);
            transition: transform .5s ease;
            pointer-events: none;
        }

        .btn:hover::after { transform: translate(-50%, -50%) scale(1); }
        .btn:hover { transform: translateY(-4px); box-shadow: 0 10px 26px rgba(124,44,255,0.22); }
        .btn:active { transform: translateY(-1px) scale(.995); }
        .btn:focus { outline: 3px solid rgba(124,44,255,0.18); outline-offset: 4px; }

        .btn {
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <main>
        <div>
        <h1>До запуска осталось</h1>
        <p id="countdown" class="time">00:00:00</p>
        </div>
        <p>TheMMM.ru ждёт запуска.</p>
        <p>Чем больше лайков - тем больше мне мотивации и вскоре сайт будет готов!</p>
        <button id="like-button" class="btn" type="button">Поставь лайк :3</button>
        <div id="likeMessage" class="like-message" aria-live="polite"></div>
    </main>
    <script async src="https://cdn.jsdelivr.net/npm/counterapi/dist/counter.browser.min.js"></script>
    <script>
        function formatTimeUnit(value) {
            return String(value).padStart(2, '0');
        }

        function getNextDeadline() {
            const now = new Date();
            const deadline = new Date(now);
            deadline.setHours(17, 0, 0, 0);

            if (now >= deadline) {
                deadline.setDate(deadline.getDate() + 1);
            }

            return deadline;
        }

        function isAfterJune2At17(now) {
            return now.getMonth() === 5 && now.getDate() === 2 && now.getHours() >= 17;
        }

        function updateCountdown() {
            const countdownEl = document.getElementById('countdown');
            if (!countdownEl) return;

            const now = new Date();
            if (isAfterJune2At17(now)) {
                countdownEl.textContent = 'Запускаем...';
                return;
            }

            const deadline = getNextDeadline();
            const diff = deadline - now;

            if (diff <= 0) {
                countdownEl.textContent = '17:00 наступило';
                return;
            }

            const seconds = Math.floor(diff / 1000) % 60;
            const minutes = Math.floor(diff / (1000 * 60)) % 60;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            countdownEl.textContent = `${formatTimeUnit(hours)}:${formatTimeUnit(minutes)}:${formatTimeUnit(seconds)}`;
        }

        function initCounter() {
            console.log('initCounter called, Counter defined:', typeof Counter !== 'undefined');
            
            if (typeof Counter === 'undefined') {
                console.log('Counter not ready, retrying in 100ms...');
                setTimeout(initCounter, 100);
                return;
            }

            console.log('Counter loaded successfully');
            
            const likeButton = document.getElementById('like-button');
            const likeMessage = document.getElementById('likeMessage');
            const storageKey = 'comingSoonLiked';
            const counterName = 'themmmru-likes';
            
            console.log('Creating counter with workspace: matvey-emelyanovs-team-4321');
            const counter = new Counter({ workspace: 'matvey-emelyanovs-team-4321' });
            const alreadyLiked = localStorage.getItem(storageKey) === 'true';

            function showLikeMessage(count) {
                likeMessage.innerHTML = 'Количество лайков - <strong>' + count + '</strong>';
                likeMessage.classList.add('show');
            }

            function disableButton() {
                likeButton.textContent = 'Вы уже поставили лайк';
                likeButton.classList.add('disabled');
                likeButton.disabled = true;
            }

            function setButtonCount(count) {
                likeButton.textContent = 'Поставь лайк :3 (' + count + ')';
            }

            console.log('Fetching counter value for:', counterName);
            counter.get(counterName)
                .then(result => {
                    console.log('Counter get result:', result);
                    const count = result.data?.up_count ?? result.count ?? 0;
                    setButtonCount(count);
                    if (alreadyLiked) {
                        disableButton();
                        showLikeMessage(count);
                    }
                })
                .catch(err => {
                    console.error('Error getting counter:', err);
                    likeMessage.textContent = 'Не удалось загрузить счётчик.';
                    likeMessage.classList.add('show');
                });

            likeButton.addEventListener('click', function() {
                console.log('Like button clicked, alreadyLiked:', alreadyLiked);
                if (alreadyLiked) return;

                console.log('Incrementing counter...');
                counter.up(counterName)
                    .then(result => {
                        console.log('Counter up result:', result);
                        const count = result.data?.up_count ?? result.count ?? 0;
                        localStorage.setItem(storageKey, 'true');
                        disableButton();
                        showLikeMessage(count);
                    })
                    .catch(err => {
                        console.error('Error incrementing counter:', err);
                        likeMessage.textContent = 'Ошибка при отправке лайка. Попробуйте позже.';
                        likeMessage.classList.add('show');
                    });
            });
        }

        console.log('Script loaded, waiting for DOM ready...');
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM ready, calling initCounter');
            updateCountdown();
            setInterval(updateCountdown, 1000);
            initCounter();
        });
        
        if (document.readyState === 'loading') {
            console.log('Document still loading');
        } else {
            console.log('Document already ready, calling initCounter directly');
            updateCountdown();
            setInterval(updateCountdown, 1000);
            initCounter();
        }
    </script>
</body>
</html>
